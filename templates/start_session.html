{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Start Attendance Session</h2>
        <p class="text-gray-600">Select a class and subject to launch the live recognition popup.</p>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
        
        <form method="post" action="{{ url_for('start_session') }}" target="attendancePopup" onsubmit="handleSessionStart(event)">
            
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Class</label>
                <select name="class_name" class="shadow-sm border rounded w-full py-3 px-4 text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white transition" required>
                    <option value="" disabled selected>Select the class attending...</option>
                    {% for c in classes %}
                        <option value="{{ c.class_name }}">{{ c.class_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Subject</label>
                <input class="shadow-sm appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 transition" type="text" name="subject" placeholder="e.g. Artificial Intelligence" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition duration-150 flex justify-center items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Start & Open Camera Popup
            </button>
        </form>
    </div>
</div>

<script>
function handleSessionStart(event) {
    // Open an empty popup window with the target name specified in the form
    const left = (screen.width/2) - 450;
    const top = (screen.height/2) - 350;
    window.open('', 'attendancePopup', `width=900,height=700,left=${left},top=${top}`);
    
    // Allow the form to submit into the popup, then redirect the parent window to the dashboard
    setTimeout(() => {
        window.location.href = "{{ url_for('dashboard') }}";
    }, 1000);
}
</script>
{% endblock %}
