{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">Admin Login</h2>
        <p class="text-gray-500 mt-2 text-sm">Sign in to manage the attendance system</p>
    </div>
    
    {% if error %}
    <div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded shadow-sm" role="alert">
      <p class="font-bold">Error</p>
      <p>{{ error }}</p>
    </div>
    {% endif %}

    <form method="post" action="{{ url_for('login') }}">
      <div class="mb-5">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="username">
          Username
        </label>
        <input class="shadow-sm appearance-none border rounded w-full py-3 px-4 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150" id="username" type="text" name="username" placeholder="Enter your username" required>
      </div>
      
      <div class="mb-6">
        <label class="block text-gray-700 text-sm font-bold mb-2" for="password">
          Password
        </label>
        <input class="shadow-sm appearance-none border rounded w-full py-3 px-4 text-gray-700 mb-3 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-150" id="password" type="password" name="password" placeholder="••••••••" required>
      </div>
      
      <div class="flex items-center justify-between mt-8">
        <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50 transition duration-150 shadow-md" type="submit">
          Secure Login
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
